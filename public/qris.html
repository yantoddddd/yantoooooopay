<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes,viewport-fit=cover"><title>QRIS Payment</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:16px;display:flex;align-items:center;justify-content:center}.container{max-width:420px;width:100%;margin:0 auto;background:#fff;border-radius:32px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.3);animation:fadeIn 0.4s ease}.header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:20px;text-align:center}.header h1{font-size:1.4rem;font-weight:800}.header p{font-size:0.65rem;opacity:0.9}.content{padding:24px 20px}.total-card{background:linear-gradient(135deg,#10b981 0%,#059669 100%);border-radius:24px;padding:24px;text-align:center;color:#fff;margin-bottom:20px}.total-card .label{font-size:0.75rem;opacity:0.9}.total-card .amount{font-size:2.2rem;font-weight:800;margin-top:8px}.detail-card{background:#f8fafc;border-radius:24px;padding:20px;margin-bottom:20px}.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #e2e8f0}.detail-row:last-child{border-bottom:none}.detail-label{color:#475569;font-weight:500;font-size:0.8rem}.detail-value{font-weight:700;color:#0f172a;font-size:0.9rem}.qris-area{background:#fff;border-radius:24px;padding:20px;text-align:center;border:2px solid #eef2ff;margin-bottom:20px}.qris-img{width:100%;max-width:240px;height:auto;margin:0 auto;display:block}.countdown-card{background:#fef3c7;border-radius:20px;padding:16px;text-align:center;margin-bottom:20px}.countdown-card .label{font-size:0.7rem;color:#b45309;font-weight:600}.countdown-timer{font-size:1.4rem;font-weight:800;color:#b45309;font-family:monospace}.countdown-timer.expired{color:#dc2626}.warning-box{background:#fee2e2;border-radius:20px;padding:16px;text-align:center;margin-bottom:20px}.warning-text{color:#991b1b;font-weight:600;font-size:0.75rem}.info-bayar{background:#e6f7e6;border-radius:20px;padding:16px;text-align:center}.info-bayar h4{color:#2e7d32;font-size:0.8rem;margin-bottom:8px}.step-list{font-size:0.65rem;color:#2e7d32;text-align:left;display:inline-block}.step-list li{margin:4px 0;margin-left:20px}.footer{background:#f1f5f9;padding:12px;text-align:center;font-size:0.55rem;color:#94a3b8}.success-container{padding:48px 24px 40px;text-align:center}.success-check{width:80px;height:80px;background:#10b981;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}.success-check svg{width:44px;height:44px;stroke:#fff;stroke-width:3;fill:none}.success-container h2{color:#0f172a;font-size:1.6rem;font-weight:700;margin-bottom:8px}.success-container p{color:#64748b;font-size:0.9rem}.error-box{background:#fee2e2;border-radius:24px;padding:40px 20px;text-align:center;color:#dc2626}.loading{text-align:center;padding:60px 20px}.spinner{width:45px;height:45px;border:4px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 15px}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="container" id="container"><div class="header"><h1>💳 QRIS Payment</h1><p>Scan & Bayar</p></div><div class="content" id="content"><div class="loading" id="loading"><div class="spinner"></div><p>Memuat data transaksi...</p></div></div></div><script>(function(){const urlParams=new URLSearchParams(window.location.search);const txId=urlParams.get('id');if(!txId){document.getElementById('content').innerHTML='<div class="error-box"><h3>❌ Link Tidak Valid</h3><p>ID transaksi tidak ditemukan</p></div>';document.getElementById('loading').style.display='none';return;}let transactions=[];try{transactions=JSON.parse(localStorage.getItem('qris_transactions')||'[]');}catch(e){transactions=[];}let tx=transactions.find(t=>t.id===txId);if(!tx&&txId==='DEMO-001'){tx={id:'DEMO-001',qrisImage:'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=DEMO',amount:50000,total:51000,qrisId:'demo-123',expiredAt:new Date(Date.now()+900000).toISOString()};}if(!tx){document.getElementById('content').innerHTML='<div class="error-box"><h3>⚠️ Transaksi Tidak Ditemukan</h3><p>QRIS mungkin sudah kadaluarsa atau link salah</p></div>';document.getElementById('loading').style.display='none';return;}const expiredDate=new Date(tx.expiredAt);let isPaid=localStorage.getItem(`paid_${tx.qrisId}`)==='true'||false;const formatRupiah=(n)=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);function formatCountdown(ms){if(ms<=0)return'EXPIRED';const sec=Math.floor(ms/1000);const m=Math.floor(sec/60);const s=sec%60;if(m>=60){const h=Math.floor(m/60);const mm=m%60;return`${h}j ${mm}m`;}return`${m}m ${s}d`;}function updateCountdown(){if(isPaid)return;const remaining=expiredDate-Date.now();const countdownEl=document.getElementById('countdownTimer');if(remaining<=0){if(countdownEl){countdownEl.innerHTML='EXPIRED';countdownEl.classList.add('expired');}document.getElementById('expiredWarning').style.display='block';document.getElementById('qrImage').style.opacity='0.5';if(window.countdownInterval)clearInterval(window.countdownInterval);}else{if(countdownEl){countdownEl.innerHTML=formatCountdown(remaining);countdownEl.classList.remove('expired');}}}async function checkPaymentStatus(){if(isPaid)return true;try{const res=await fetch(`/api/webhook/check?qrisId=${tx.qrisId}`);const data=await res.json();if(data.paid){isPaid=true;localStorage.setItem(`paid_${tx.qrisId}`,'true');showSuccess();if(window.countdownInterval)clearInterval(window.countdownInterval);if(window.statusInterval)clearInterval(window.statusInterval);return true;}return false;}catch(e){return false;}}function showSuccess(){const container=document.getElementById('container');container.innerHTML=`<div class="container"><div class="content" style="padding:0"><div class="success-container"><div class="success-check"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div><h2>Pembayaran Berhasil!</h2><p>Terima kasih</p></div><div class="footer">© YANTO PAY • QRIS by Qrispy.id</div></div></div>`;}function renderPage(){if(isPaid){showSuccess();return;}document.getElementById('loading').style.display='none';document.getElementById('content').innerHTML=`<div class="total-card"><div class="label">Total Bayar</div><div class="amount">${formatRupiah(tx.total)}</div></div><div class="detail-card"><div class="detail-row"><span class="detail-label">🆔 Trx ID</span><span class="detail-value">${tx.id}</span></div><div class="detail-row"><span class="detail-label">💰 Jumlah</span><span class="detail-value">${formatRupiah(tx.amount)}</span></div><div class="detail-row"><span class="detail-label">📊 Biaya Admin</span><span class="detail-value">${formatRupiah(tx.total-tx.amount)}</span></div></div><div class="qris-area"><img id="qrImage" src="${tx.qrisImage}" class="qris-img" alt="QRIS"><div style="font-size:0.6rem;color:#64748b;margin-top:8px">Scan QRIS untuk membayar</div></div><div class="countdown-card"><div class="label">⏰ Bayar Sebelum</div><div id="countdownTimer" class="countdown-timer">--</div></div><div id="expiredWarning" style="display:none"><div class="warning-box"><div class="warning-text">⚠️ QRIS kadaluarsa. Silakan minta QRIS baru ke admin.</div></div></div><div class="info-bayar"><h4>📱 Cara Bayar</h4><ul class="step-list"><li>1️⃣ Buka DANA / OVO / GoPay / Bank</li><li>2️⃣ Pilih <strong>Scan QRIS</strong></li><li>3️⃣ Arahkan kamera ke QRIS di atas</li><li>4️⃣ Konfirmasi & selesaikan pembayaran</li></ul></div><div class="footer">© YANTO PAY • QRIS by Qrispy.id</div>`;updateCountdown();window.countdownInterval=setInterval(updateCountdown,1000);window.statusInterval=setInterval(checkPaymentStatus,1500);}renderPage();})();</script></body></html>
