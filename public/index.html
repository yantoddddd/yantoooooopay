<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YANTO PAY - QRIS Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .content {
            padding: 30px;
        }

        .info-box {
            background: #f0f4ff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-box .label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-box .value {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }

        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .amount-btn {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .amount-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .amount-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.2s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .qr-result {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
        }

        .qr-result img {
            max-width: 250px;
            margin: 15px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .transaction-info {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
            border: 1px solid #e0e0e0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
        }

        .info-value {
            font-weight: bold;
            color: #333;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            display: none;
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .footer {
            background: #f5f5f5;
            padding: 15px;
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 YANTO PAY</h1>
            <p>QRIS Generator • Top Up DANA</p>
        </div>
        
        <div class="content">
            <div class="info-box">
                <div class="label">📱 Nomor DANA Tujuan</div>
                <div class="value">0896-7604-1776</div>
            </div>
            
            <div class="info-box">
                <div class="label">💡 Powered by Qrispy.id</div>
                <div class="value" style="font-size: 0.9em;">Uang masuk akun Qrispy → Withdraw manual</div>
            </div>
            
            <div class="amount-grid" id="amountGrid">
                <div class="amount-btn" data-amount="5000">Rp 5.000</div>
                <div class="amount-btn" data-amount="10000">Rp 10.000</div>
                <div class="amount-btn" data-amount="20000">Rp 20.000</div>
                <div class="amount-btn" data-amount="25000">Rp 25.000</div>
                <div class="amount-btn" data-amount="50000">Rp 50.000</div>
                <div class="amount-btn" data-amount="100000">Rp 100.000</div>
                <div class="amount-btn" data-amount="250000">Rp 250.000</div>
                <div class="amount-btn" data-amount="500000">Rp 500.000</div>
            </div>
            
            <button class="generate-btn" id="generateBtn">✨ GENERATE QRIS</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Menghubungi Qrispy...</p>
            </div>
            
            <div class="qr-result" id="qrResult">
                <img id="qrImage" src="" alt="QRIS">
                <div class="transaction-info" id="transactionInfo"></div>
            </div>
            
            <div class="error" id="error"></div>
        </div>
        
        <div class="footer">
            © 2025 YANTO PAY • QRIS by Qrispy.id
        </div>
    </div>

    <script>
        let selectedAmount = 5000;
        
        // Pilih nominal
        document.querySelectorAll('.amount-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedAmount = parseInt(this.dataset.amount);
            });
        });
        
        // Set default active
        document.querySelector('.amount-btn[data-amount="5000"]').classList.add('active');
        
        // Generate QRIS
        const generateBtn = document.getElementById('generateBtn');
        const loadingDiv = document.getElementById('loading');
        const qrResultDiv = document.getElementById('qrResult');
        const qrImage = document.getElementById('qrImage');
        const transactionInfo = document.getElementById('transactionInfo');
        const errorDiv = document.getElementById('error');
        
        generateBtn.addEventListener('click', async () => {
            // Reset tampilan
            loadingDiv.style.display = 'block';
            qrResultDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            generateBtn.disabled = true;
            
            try {
                // Panggil API
                const response = await fetch(`/api/qris?amount=${selectedAmount}`);
                const data = await response.json();
                
                if (data.success && data.qrImageUrl) {
                    // Tampilkan QRIS
                    qrImage.src = data.qrImageUrl;
                    
                    // Format expired time
                    let expiredText = '';
                    if (data.expiredAt) {
                        const expiredDate = new Date(data.expiredAt);
                        expiredText = `
                            <div class="info-row">
                                <span class="info-label">⏰ Kadaluarsa</span>
                                <span class="info-value">${expiredDate.toLocaleString()}</span>
                            </div>
                        `;
                    }
                    
                    if (data.expiresIn) {
                        const minutes = Math.floor(data.expiresIn / 60);
                        expiredText += `
                            <div class="info-row">
                                <span class="info-label">⏱️ Berlaku</span>
                                <span class="info-value">${minutes} menit</span>
                            </div>
                        `;
                    }
                    
                    // Tampilkan info transaksi
                    transactionInfo.innerHTML = `
                        <div class="info-row">
                            <span class="info-label">💰 Nominal</span>
                            <span class="info-value">Rp ${data.amount.toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">🆔 ID Transaksi</span>
                            <span class="info-value">${data.qrisId}</span>
                        </div>
                        ${expiredText}
                        <div class="info-row">
                            <span class="info-label">📱 DANA Tujuan</span>
                            <span class="info-value">0896-7604-1776</span>
                        </div>
                    `;
                    
                    qrResultDiv.style.display = 'block';
                } else {
                    throw new Error(data.error || 'Gagal generate QRIS');
                }
                
            } catch (err) {
                errorDiv.innerHTML = `⚠️ ${err.message}`;
                errorDiv.style.display = 'block';
                console.error('Error:', err);
            } finally {
                loadingDiv.style.display = 'none';
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
