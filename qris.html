<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QRIS Payment</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;display:flex;align-items:center;justify-content:center}.container{max-width:450px;margin:0 auto;background:#fff;border-radius:32px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.3);animation:fadeIn 0.5s ease}.header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:25px;text-align:center}.header h1{font-size:1.8em;font-weight:900}.content{padding:30px}.info-merchant{background:#fef9e3;border-radius:20px;padding:15px;margin-bottom:25px;text-align:center;border-left:4px solid #f59e0b}.info-merchant .name{font-weight:900;font-size:1.3em;color:#92400e}.info-merchant .note{font-size:0.7em;color:#b45309;margin-top:5px}.qris-area{text-align:center;margin:20px 0;background:#f8fafc;border-radius:24px;padding:25px}.qris-img{width:280px;height:280px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}.detail-trans{background:#f1f5f9;border-radius:20px;padding:20px;margin:20px 0}.detail-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e2e8f0}.detail-item:last-child{border-bottom:none}.detail-label{color:#475569;font-weight:500}.detail-value{font-weight:800;color:#0f172a;font-size:1.1em}.cara-bayar{background:#e6f7e6;border-radius:16px;padding:15px;font-size:0.85em;color:#2e7d32;text-align:center;margin-top:20px}.footer{background:#f8fafc;padding:15px;text-align:center;font-size:0.7em;color:#94a3b8}.error-box{background:#fee2e2;border-radius:20px;padding:40px;text-align:center;color:#dc2626}.loading{text-align:center;padding:50px}.spinner{width:50px;height:50px;border:4px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 15px}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="container" id="container"><div class="header"><h1>💳 QRIS Payment</h1></div><div class="content" id="content"><div class="loading" id="loading"><div class="spinner"></div><p>Memuat data transaksi...</p></div></div></div><script>(function(){const urlParams=new URLSearchParams(window.location.search);const txId=urlParams.get('id');if(!txId){document.getElementById('content').innerHTML='<div class="error-box"><h3>❌ Link Tidak Valid</h3><p>ID transaksi tidak ditemukan</p></div>';return;}let transactions=[];try{transactions=JSON.parse(localStorage.getItem('qris_transactions')||'[]');}catch(e){transactions=[];}const tx=transactions.find(t=>t.id===txId);if(!tx){document.getElementById('content').innerHTML='<div class="error-box"><h3>⚠️ Transaksi Tidak Ditemukan</h3><p>QRIS mungkin sudah kadaluarsa atau link salah</p></div>';document.getElementById('loading').style.display='none';return;}const expiredDate=new Date(tx.expiredAt);const now=new Date();const isExpired=now>expiredDate;document.getElementById('loading').style.display='none';document.getElementById('content').innerHTML=`<div class="info-merchant"><div class="name">YANTO PAY</div><div class="note">✓ Merchant Resmi QRIS</div></div><div class="qris-area"><img src="${tx.qrisImage}" class="qris-img" alt="QRIS"><div style="margin-top:10px;font-size:0.7em;color:#64748b">Scan dengan DANA/OVO/GoPay</div></div><div class="detail-trans"><div class="detail-item"><span class="detail-label">💳 ID Transaksi</span><span class="detail-value">${tx.id}</span></div><div class="detail-item"><span class="detail-label">💰 Nominal</span><span class="detail-value">${new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR'}).format(tx.amount)}</span></div><div class="detail-item"><span class="detail-label">💸 Total Bayar</span><span class="detail-value">${new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR'}).format(tx.total)}</span></div><div class="detail-item"><span class="detail-label">📆 Kadaluarsa</span><span class="detail-value">${new Date(tx.expiredAt).toLocaleString('id-ID')} ${isExpired?'<span style="color:#dc2626">(EXPIRED)</span>':''}</span></div></div><div class="cara-bayar"><strong>📱 Cara Bayar:</strong><br>1. Buka DANA / OVO / GoPay / Bank Mobile<br>2. Pilih menu Scan QRIS<br>3. Scan QRIS di atas<br>4. Konfirmasi pembayaran</div><div class="footer">© YANTO PAY • QRIS by Qrispy.id</div>`;if(isExpired){document.querySelector('.cara-bayar').innerHTML='<strong>⚠️ QRIS Kadaluarsa</strong><br>QRIS ini sudah tidak berlaku. Silakan minta QRIS baru ke admin.';}})();</script></body></html>
