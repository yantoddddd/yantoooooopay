<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes,viewport-fit=cover"><title>QRIS Payment</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:16px;display:flex;align-items:center;justify-content:center}.container{max-width:480px;width:100%;margin:0 auto;background:#fff;border-radius:32px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.3);animation:fadeIn 0.4s ease}.header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:24px 20px;text-align:center}.header h1{font-size:1.6rem;font-weight:900}.header p{font-size:0.7rem;opacity:0.9}.content{padding:24px 20px}.merchant-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:20px;padding:16px;margin-bottom:20px;text-align:center}.merchant-name{font-weight:900;font-size:1.3rem;color:#92400e}.qris-area{text-align:center;margin:16px 0;background:#fff;border-radius:28px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.05);border:1px solid #eef2ff}.qris-img{width:100%;max-width:280px;height:auto;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1);display:block;margin:0 auto}.detail-card{background:#f8fafc;border-radius:24px;padding:20px;margin:16px 0}.detail-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #e2e8f0}.detail-row:last-child{border-bottom:none}.detail-label{color:#475569;font-weight:500;font-size:0.85rem}.detail-value{font-weight:800;color:#0f172a;font-size:0.95rem;text-align:right}.countdown{font-family:monospace;background:#fef3c7;padding:4px 10px;border-radius:20px;color:#b45309;font-size:0.85rem}.countdown.expired{background:#fee2e2;color:#dc2626}.warning-box{background:#fef2f2;border-radius:16px;padding:12px;margin-top:16px;text-align:center;border-left:4px solid #dc2626}.warning-text{color:#991b1b;font-weight:600;font-size:0.75rem}.info-bayar{background:#e6f7e6;border-radius:20px;padding:16px;margin-top:16px;text-align:center}.info-bayar h4{color:#2e7d32;font-size:0.9rem;margin-bottom:8px}.step-list{font-size:0.7rem;color:#2e7d32;text-align:left;display:inline-block;margin-top:5px}.step-list li{margin:4px 0;margin-left:20px}.footer{background:#f1f5f9;padding:14px;text-align:center;font-size:0.6rem;color:#94a3b8}.error-box{background:#fee2e2;border-radius:24px;padding:40px 20px;text-align:center;color:#dc2626}.loading{text-align:center;padding:60px 20px}.spinner{width:45px;height:45px;border:4px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 15px}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="container" id="container"><div class="header"><h1>💳 QRIS Payment</h1><p>Scan & Bayar</p></div><div class="content" id="content"><div class="loading" id="loading"><div class="spinner"></div><p>Memuat data transaksi...</p></div></div></div><script>(function(){const urlParams=new URLSearchParams(window.location.search);const txId=urlParams.get('id');if(!txId){document.getElementById('content').innerHTML='<div class="error-box"><h3>❌ Link Tidak Valid</h3><p>ID transaksi tidak ditemukan</p><p style="font-size:0.7rem;margin-top:10px">Silakan hubungi admin</p></div>';document.getElementById('loading').style.display='none';return;}let transactions=[];try{transactions=JSON.parse(localStorage.getItem('qris_transactions')||'[]');}catch(e){transactions=[];}const tx=transactions.find(t=>t.id===txId);if(!tx){document.getElementById('content').innerHTML='<div class="error-box"><h3>⚠️ Transaksi Tidak Ditemukan</h3><p>QRIS mungkin sudah kadaluarsa atau link salah</p><p style="font-size:0.7rem;margin-top:10px">Silakan minta QRIS baru ke admin</p></div>';document.getElementById('loading').style.display='none';return;}const expiredDate=new Date(tx.expiredAt);const formatRupiah=(n)=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);function formatCountdown(ms){if(ms<=0)return'EXPIRED';const sec=Math.floor(ms/1000);const h=Math.floor(sec/3600);const m=Math.floor((sec%3600)/60);const s=sec%60;if(h>0)return`${h}j ${m}m ${s}d`;if(m>0)return`${m}m ${s}d`;return`${s} detik`;}function updateCountdown(){const now=new Date();const remaining=expiredDate-now;const countdownEl=document.getElementById('countdownTimer');if(remaining<=0){if(countdownEl){countdownEl.innerHTML='⏰ EXPIRED';countdownEl.classList.add('expired');}document.getElementById('expiredWarning').style.display='block';document.getElementById('qrImage').style.opacity='0.5';if(window.countdownInterval)clearInterval(window.countdownInterval);}else{if(countdownEl){countdownEl.innerHTML=formatCountdown(remaining);countdownEl.classList.remove('expired');}}}document.getElementById('loading').style.display='none';document.getElementById('content').innerHTML=`<div class="merchant-card"><div class="merchant-name">YANTO PAY</div><div style="font-size:0.65rem;color:#b45309">✓ Merchant Resmi QRIS</div></div><div class="qris-area"><img id="qrImage" src="${tx.qrisImage}" class="qris-img" alt="QRIS" loading="eager"><div style="font-size:0.65rem;color:#64748b;margin-top:8px">📱 Scan DANA / OVO / GoPay</div></div><div class="detail-card"><div class="detail-row"><span class="detail-label">🆔 ID</span><span class="detail-value">${tx.id}</span></div><div class="detail-row"><span class="detail-label">💰 Nominal</span><span class="detail-value">${formatRupiah(tx.amount)}</span></div><div class="detail-row"><span class="detail-label">💸 Total</span><span class="detail-value">${formatRupiah(tx.total)}</span></div><div class="detail-row"><span class="detail-label">⏰ Kadaluarsa</span><span class="detail-value"><span id="countdownTimer" class="countdown">--</span></span></div></div><div id="expiredWarning" style="display:none"><div class="warning-box"><div class="warning-text">⚠️ QRIS kadaluarsa. Minta QRIS baru ke admin.</div></div></div><div class="info-bayar"><h4>📱 Cara Bayar</h4><ul class="step-list" style="list-style:none"><li>1️⃣ Buka DANA / OVO / GoPay</li><li>2️⃣ Pilih <strong>Scan QRIS</strong></li><li>3️⃣ Scan QRIS di atas</li><li>4️⃣ Konfirmasi pembayaran</li></ul></div><div class="footer">© YANTO PAY • QRIS by Qrispy.id</div>`;updateCountdown();window.countdownInterval=setInterval(updateCountdown,1000);})();</script></body></html>
